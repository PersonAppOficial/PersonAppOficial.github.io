<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DocuVoz Pro — Convertidor + Lector de Voz</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&display=swap');

:root {
--primary: #6366f1;
}

* { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }

.app {
font-family: 'Inter', system_ui, sans-serif;
}

.title-font {
font-family: 'Space Grotesk', sans-serif;
}

.glass {
background: rgba(255,255,255,0.95);
backdrop-filter: blur(16px);
}

.drop-zone {
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.wave {
animation: wavePulse 1.2s ease-in-out infinite;
}

@keyframes wavePulse {
0%, 100% { height: 6px; opacity: 0.4; }
50% { height: 36px; opacity: 1; }
}

.toast {
animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
</style>
</head>
<body class="app bg-gradient-to-br from-indigo-50 via-white to-cyan-50 min-h-screen pb-12">
<div class="max-w-2xl mx-auto px-4 pt-8">

<!-- HEADER -->
<div class="flex items-center justify-between mb-8">
<div class="flex items-center gap-x-3">
<div class="w-11 h-11 bg-gradient-to-br from-indigo-600 to-cyan-500 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🗂️</div>
<div>
<h1 class="title-font text-4xl font-semibold tracking-tighter text-indigo-950">DocuVoz <span class="text-cyan-500">Pro</span></h1>
<p class="text-sm text-indigo-600 font-medium -mt-1">100% local • Gratis • Sin registro</p>
</div>
</div>
<div onclick="toggleTheme()" class="w-9 h-9 flex items-center justify-center bg-white shadow rounded-2xl cursor-pointer hover:scale-110 text-xl" id="themeBtn">
🌙
</div>
</div>

<!-- PASO 1: SUBIR ARCHIVO -->
<div class="glass border border-indigo-100 rounded-3xl p-6 shadow-xl mb-6">
<div class="flex items-center gap-x-2 mb-4 text-indigo-700 font-semibold text-lg">
<span class="text-2xl">📤</span>
<span>Paso 1 — Sube tu archivo</span>
</div>

<div id="dropZone"
onclick="document.getElementById('fileInput').click()"
class="drop-zone border-2 border-dashed border-indigo-300 hover:border-indigo-500 rounded-3xl py-14 text-center cursor-pointer bg-white/70">
<input type="file" id="fileInput" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.webp,.bmp,.gif,.tiff" class="hidden" onchange="handleFileSelect(event)">

<div class="mx-auto w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center text-5xl mb-4">☁️</div>
<p class="font-semibold text-indigo-900 text-xl">Arrastra o haz clic para subir</p>
<p class="text-indigo-500 text-sm mt-1">PDF • Word • Imágenes con texto</p>

<div class="flex justify-center gap-2 mt-6">
<span class="px-4 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-3xl">PDF</span>
<span class="px-4 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded-3xl">DOCX</span>
<span class="px-4 py-1 bg-emerald-100 text-emerald-700 text-xs font-bold rounded-3xl">JPG / PNG</span>
</div>
</div>

<!-- Archivo seleccionado -->
<div id="filePreview" class="hidden mt-6 p-4 bg-white border border-indigo-200 rounded-2xl flex items-center gap-x-4">
<div id="fileIcon" class="text-4xl">📄</div>
<div class="flex-1 min-w-0">
<p id="fileName" class="font-semibold text-indigo-900 truncate"></p>
<p id="fileSize" class="text-xs text-indigo-500"></p>
</div>
<button onclick="clearFile()"
class="w-9 h-9 flex items-center justify-center text-red-500 hover:bg-red-100 rounded-2xl text-xl">✕</button>
</div>
</div>

<!-- PASO 2: ACCIONES -->
<div id="actionPanel" class="glass border border-indigo-100 rounded-3xl p-6 shadow-xl mb-6 hidden">
<div class="flex items-center gap-x-2 mb-5 text-indigo-700 font-semibold text-lg">
<span class="text-2xl">⚡</span>
<span>Paso 2 — ¿Qué quieres hacer?</span>
</div>

<div class="grid grid-cols-2 gap-3">
<button onclick="selectAction('pdf')" id="btn-pdf"
class="action-btn flex flex-col items-center justify-center gap-2 py-6 px-4 rounded-3xl border-2 border-transparent bg-white hover:shadow-md">
<span class="text-5xl">📕</span>
<span class="font-semibold text-indigo-900">Guardar como PDF</span>
</button>
<button onclick="selectAction('word')" id="btn-word"
class="action-btn flex flex-col items-center justify-center gap-2 py-6 px-4 rounded-3xl border-2 border-transparent bg-white hover:shadow-md">
<span class="text-5xl">📘</span>
<span class="font-semibold text-indigo-900">Convertir a Word</span>
</button>
<button onclick="selectAction('excel')" id="btn-excel"
class="action-btn flex flex-col items-center justify-center gap-2 py-6 px-4 rounded-3xl border-2 border-transparent bg-white hover:shadow-md">
<span class="text-5xl">📗</span>
<span class="font-semibold text-indigo-900">Convertir a Excel</span>
</button>
<button onclick="selectAction('voice')" id="btn-voice"
class="action-btn flex flex-col items-center justify-center gap-2 py-6 px-4 rounded-3xl border-2 border-transparent bg-white hover:shadow-md">
<span class="text-5xl">🔊</span>
<span class="font-semibold text-indigo-900">Leer en voz alta</span>
</button>
</div>

<button onclick="executeAction()" id="mainActionBtn"
class="w-full mt-6 py-4 bg-gradient-to-r from-indigo-600 to-cyan-500 text-white font-semibold text-lg rounded-3xl shadow-lg flex items-center justify-center gap-x-3 disabled:opacity-50">
<span id="btnText">🚀 Ejecutar acción</span>
</button>
</div>

<!-- BARRA DE PROGRESO -->
<div id="progressBar" class="hidden glass border border-indigo-100 rounded-3xl p-6 mb-6">
<div class="flex justify-between text-sm font-medium text-indigo-600 mb-3">
<span id="progressLabel">Procesando archivo...</span>
<span id="progressPercent">0%</span>
</div>
<div class="h-3 bg-indigo-100 rounded-3xl overflow-hidden">
<div id="progressFill" class="h-3 bg-gradient-to-r from-indigo-600 to-cyan-500 w-0 rounded-3xl"></div>
</div>
</div>

<!-- TEXTO EXTRAÍDO -->
<div id="textResultPanel" class="glass border border-indigo-100 rounded-3xl p-6 shadow-xl hidden">
<div class="flex justify-between items-baseline mb-4">
<div class="text-lg font-semibold text-indigo-900 flex items-center gap-x-2">
📝 Texto extraído
</div>
<div class="flex gap-x-2">
<button onclick="copyText()" class="text-xs px-4 py-2 bg-white border border-indigo-200 hover:bg-indigo-50 rounded-2xl font-medium">📋 Copiar</button>
<button onclick="downloadTxt()" class="text-xs px-4 py-2 bg-white border border-indigo-200 hover:bg-indigo-50 rounded-2xl font-medium">📥 .txt</button>
</div>
</div>
<div id="extractedText" class="max-h-64 overflow-y-auto text-sm leading-relaxed text-slate-700 bg-white/70 p-5 rounded-2xl border border-indigo-100 whitespace-pre-wrap"></div>
</div>

<!-- LECTOR DE VOZ -->
<div id="voicePanel" class="hidden glass border border-indigo-100 rounded-3xl p-6 shadow-xl mt-6">
<div class="flex items-center justify-between mb-5">
<div class="text-lg font-semibold text-indigo-900 flex items-center gap-2">
🎤 Lector de voz en español latino
</div>
<select id="voiceSelect" class="bg-white border border-indigo-200 text-indigo-900 rounded-2xl px-4 py-2 text-sm font-medium focus:outline-none"></select>
</div>

<div class="flex gap-6 mb-6">
<div class="flex-1">
<label class="block text-xs font-semibold text-indigo-500 mb-2">VELOCIDAD</label>
<input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1" class="w-full accent-indigo-600" oninput="updateSliderValue(this, 'rateValue')">
<div class="flex justify-between text-xs text-indigo-400 mt-1"><span>0.5x</span><span id="rateValue" class="font-semibold text-indigo-700">1.0x</span><span>2x</span></div>
</div>
<div class="flex-1">
<label class="block text-xs font-semibold text-indigo-500 mb-2">TONO</label>
<input type="range" id="pitchSlider" min="0.5" max="2" step="0.1" value="1" class="w-full accent-indigo-600" oninput="updateSliderValue(this, 'pitchValue')">
<div class="flex justify-between text-xs text-indigo
